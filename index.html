<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
  <title>Museum Audio Guide — NYC Edition</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Screen 1: Museum Select -->
    <div id="museum-select" class="screen">
      <header class="header">
        <h1>Museum Audio Guide (NYC Edition)</h1>
        <span class="header-meta">Select a museum</span>
      </header>
      <div class="content">
        <button class="museum-card focusable" data-action="select-museum" data-museum="moma">
          <img class="museum-logo" src="logos/moma.svg" alt="MoMA">
          <div class="museum-info">
            <div class="museum-name">Museum of Modern Art</div>
            <div class="museum-meta">11 W 53rd St</div>
          </div>
        </button>
        <button class="museum-card focusable" data-action="select-museum" data-museum="met">
          <img class="museum-logo" src="logos/met.svg" alt="The Met">
          <div class="museum-info">
            <div class="museum-name">The Metropolitan Museum of Art</div>
            <div class="museum-meta">1000 5th Ave</div>
          </div>
        </button>
        <button class="museum-card focusable" data-action="select-museum" data-museum="frick">
          <img class="museum-logo" src="logos/frick.png" alt="Frick">
          <div class="museum-info">
            <div class="museum-name">The Frick Collection</div>
            <div class="museum-meta">1 E 70th St</div>
          </div>
        </button>
      </div>
    </div>

    <!-- Screen 2: Stop Number Entry -->
    <div id="stop-entry" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1 id="stop-entry-title">MoMA</h1>
        <span class="header-meta">Enter stop #</span>
      </header>
      <div class="content">
        <div class="stop-display">
          <div class="stop-number" id="stop-number-display">---</div>
          <button class="clear-btn focusable" data-action="num-clear">CLR</button>
        </div>
        <div class="numpad">
          <button class="numpad-btn focusable" data-action="num" data-digit="1">1</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="2">2</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="3">3</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="4">4</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="5">5</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="6">6</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="7">7</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="8">8</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="9">9</button>
          <button class="numpad-btn focusable delete-btn" data-action="num-delete">&#9003;</button>
          <button class="numpad-btn focusable" data-action="num" data-digit="0">0</button>
          <button class="numpad-btn focusable go-btn" data-action="num-go">GO</button>
        </div>
      </div>
    </div>

    <!-- Screen 3: Audio Player -->
    <div id="audio-player" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1 id="player-title">MoMA</h1>
        <span class="header-meta" id="player-stop">Stop #---</span>
      </header>
      <div class="content player-content">
        <!-- Loading -->
        <div id="player-loading" class="loading-container">
          <div class="loading-spinner"></div>
          <div class="loading-text" id="loading-text">Loading audio...</div>
        </div>
        <!-- Error -->
        <div id="player-error" class="error-container hidden">
          <div class="error-icon">&#9888;</div>
          <div class="error-message" id="error-message">Could not load.</div>
          <div class="error-url" id="error-url"></div>
          <button class="nav-item focusable" data-action="copy-url" style="margin-top:12px;">Copy URL</button>
        </div>
        <!-- Native Player -->
        <div id="player-ui" class="player-ui hidden">
          <div class="player-artwork" id="player-artwork">
            <div class="player-artwork-label" id="player-artwork-label">&#9835;</div>
          </div>
          <div class="player-info">
            <div class="player-track-title" id="player-track-title"></div>
          </div>
          <button class="play-pause-btn focusable" data-action="play-pause" id="play-pause-btn">&#9654;</button>
          <div class="progress-container">
            <input type="range" class="progress-bar focusable" id="progress-bar" min="0" max="100" value="0" step="0.1">
            <div class="time-display">
              <span id="time-current">0:00</span>
              <span id="time-duration">0:00</span>
            </div>
          </div>
        </div>
        <!-- Iframe fallback (hidden by default) -->
        <iframe id="browser-iframe" class="browser-iframe hidden"
          sandbox="allow-scripts allow-popups allow-forms"
          allow="autoplay; encrypted-media"></iframe>
        <audio id="audio-element" preload="auto"></audio>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
